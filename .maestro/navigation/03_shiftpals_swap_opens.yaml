appId: host.exp.exponent
---
- extendedWaitUntil:
    visible:
      id: start-services-card
    timeout: 20000
- tapOn:
    id: start-services-card
- extendedWaitUntil:
    visible:
      id: services-secondary-shiftpals
    timeout: 15000
- tapOn:
    id: services-secondary-shiftpals
- extendedWaitUntil:
    visible:
      id: today-title
    timeout: 15000
- scrollUntilVisible:
    element:
      id: today-open-swap
    direction: DOWN
    timeout: 20000
- tapOn:
    id: today-open-swap
- extendedWaitUntil:
    visible:
      id: swap-tab-open
    timeout: 30000
- tapOn:
    id: swap-back-to-services
- extendedWaitUntil:
    visible:
      id: today-title
    timeout: 15000
